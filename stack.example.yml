services:
  pubky-db:
    image: postgres:18
    container_name: pubky-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pubky
      POSTGRES_PASSWORD: ${PUBK…ORD}
      POSTGRES_DB: pubky_homeserver
    volumes:
      - pubky_postgres18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  pubky:
    image: ghcr.io/gillohner/pubky-homeserver:v0.9.3
    container_name: pubky-homeserver
    restart: unless-stopped
    depends_on:
      pubky-db:
        condition: service_healthy
    command: ["--data-dir", "/data"]
    ports:
      - "6286:6286"
      - "6287:6287"
      - "127.0.0.1:6288:6288"
      - "127.0.0.1:6289:6289"
    volumes:
      - /mnt/pubky/data:/data

volumes:
  pubky_postgres18: